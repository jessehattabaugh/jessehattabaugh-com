version: 0.2
env:
  variables:
    # APP_DIR: "app" # Deprecated: No longer a single app dir for lambda source
    # LAMBDA_ZIP_FILE: "app_lambda.zip" # Deprecated: No longer a single zip file
    LAMBDA_SRC_DIR: "src"
    LAMBDA_DIST_DIR: "lambda_dist_packages" # Directory to store individual zip files
phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Install phase..."
      - echo "📦 Installing project dependencies..."
      - npm install # Install project dependencies from package.json (should include marko)
      - echo "🎭 Installing Playwright and browser dependencies..."
      - npm install playwright @playwright/test # Explicitly install/update Playwright
      - npx playwright install --with-deps

  pre_build:
    commands:
      - export BRANCH_NAME=$(echo $CODEBUILD_WEBHOOK_HEAD_REF | sed 's/refs\\/heads\\////' | sed 's/[^a-zA-Z0-9-]/-/g' | cut -c 1-63)
      - if [ -z "$BRANCH_NAME" ] || [ "$BRANCH_NAME" = "null" ]; then export BRANCH_NAME="main"; fi
      - echo "🌿 Branch name: $BRANCH_NAME"
      - export CFN_STACK_NAME="${ROOT_STACK_NAME_PREFIX_ENV_VAR}-${BRANCH_NAME}"
      - echo "🏗️ CloudFormation Stack name: $CFN_STACK_NAME"
      - if [ "$BRANCH_NAME" = "main" ]; then export CFN_PARAM_SUBDOMAIN="@"; else export CFN_PARAM_SUBDOMAIN=$BRANCH_NAME; fi
      - echo "🌐 CloudFormation Subdomain parameter: $CFN_PARAM_SUBDOMAIN"
      - rm -rf $LAMBDA_DIST_DIR # Clean up dist dir from previous builds
      - mkdir -p $LAMBDA_DIST_DIR # Create dist dir for new zip files
      - export LAMBDA_FUNCTION_NAMES="" # Initialize
      - if [ -d "$LAMBDA_SRC_DIR" ] && [ -n "$(ls -A $LAMBDA_SRC_DIR)" ]; then
      -   LAMBDA_FUNCTION_NAMES=$(ls -d $LAMBDA_SRC_DIR/*/ 2>/dev/null | xargs -n 1 basename | tr '\\n' ',' | sed 's/,$//')
      - fi
      - echo "💡 Lambda function sources identified: $LAMBDA_FUNCTION_NAMES"

  build:
    commands:
      - echo "Build phase..."
      - |
        if [ -z "$LAMBDA_FUNCTION_NAMES" ]; then
          echo "🤷 No Lambda function sources found in subdirectories of $LAMBDA_SRC_DIR. Skipping Lambda packaging."
        else
          echo "📦 Packaging Lambda functions: $LAMBDA_FUNCTION_NAMES"
          for func_name in $(echo $LAMBDA_FUNCTION_NAMES | tr ',' ' '); do
            echo "⚙️ Packaging Lambda function: $func_name from $LAMBDA_SRC_DIR/$func_name"
            temp_package_dir="temp_lambda_package_for_${func_name}"
            mkdir -p "$temp_package_dir"

            # Copy function-specific code
            cp -r "$LAMBDA_SRC_DIR/$func_name/"* "$temp_package_dir/"

            # Copy essential node_modules (e.g., marko)
            # This assumes 'npm install' in the 'install' phase populated node_modules at the project root
            if [ -d "node_modules/marko" ]; then
              mkdir -p "$temp_package_dir/node_modules"
              cp -r "node_modules/marko" "$temp_package_dir/node_modules/"
            fi
            # TODO: Consider a more robust way to handle dependencies, e.g., by running 'npm install --production'
            # within each function's temporary package directory if they have their own package.json,
            # or by using Lambda Layers for common dependencies.

            current_dir=$(pwd)
            cd "$temp_package_dir"
            zip -qr "${current_dir}/$LAMBDA_DIST_DIR/${func_name}_lambda.zip" .
            cd "$current_dir"
            rm -rf "$temp_package_dir" # Clean up temporary packaging directory
            echo "✅ Lambda package $LAMBDA_DIST_DIR/${func_name}_lambda.zip created for $func_name."
          done
        fi

  post_build:
    commands:
      - echo "Post-build phase..."
      - |
        if [ -z "$LAMBDA_FUNCTION_NAMES" ]; then
          echo "🤷 No Lambda functions packaged. Skipping S3 upload for Lambdas."
        else
          echo "☁️ Uploading Lambda function packages to S3..."
          for func_name in $(echo $LAMBDA_FUNCTION_NAMES | tr ',' ' '); do
            zip_file="$LAMBDA_DIST_DIR/${func_name}_lambda.zip"
            # Standardized S3 key: lambda-code/BRANCH/FUNCTION_NAME/FUNCTION_NAME_lambda.zip
            s3_key_lambda="lambda-code/${BRANCH_NAME}/${func_name}/${func_name}_lambda.zip"
            echo "⬆️ Uploading $zip_file to s3://${STATIC_ASSETS_S3_BUCKET_ENV_VAR}/${s3_key_lambda}"
            aws s3 cp "$zip_file" "s3://${STATIC_ASSETS_S3_BUCKET_ENV_VAR}/${s3_key_lambda}" --region $CFN_REGION_ENV_VAR
          done
        fi

      - echo "🖼️ Uploading static assets to S3..."
      - aws s3 sync ./static s3://${STATIC_ASSETS_S3_BUCKET_ENV_VAR}/${BRANCH_NAME}/static/ --delete --region $CFN_REGION_ENV_VAR
      - echo "✅ Static assets uploaded."

      - echo "🚀 Deploying CloudFormation stack: $CFN_STACK_NAME"
      # IMPORTANT: The CloudFormation templates (root.json, lambda-functions.json) must be updated
      # to accept 'LambdaFunctionNames' and create/configure multiple Lambda functions accordingly.
      # Parameters like 'LambdaFunctionName', 'LambdaHandler', and 'LambdaCodeS3Key' for a single function
      # in the root stack's parameters should be revised or removed.
      - |
        aws cloudformation deploy \
          --template-file $CFN_TEMPLATE_FILE_ENV_VAR \
          --stack-name $CFN_STACK_NAME \
          --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
          --region $CFN_REGION_ENV_VAR \
          --parameter-overrides \
            ProjectName="$PROJECT_NAME_FOR_CFN_PARAM" \
            DomainName="$DOMAIN_NAME_FOR_CFN_PARAM" \
            Subdomain="$CFN_PARAM_SUBDOMAIN" \
            HostedZoneId="$HOSTED_ZONE_ID_FOR_CFN_PARAM" \
            AcmCertificateArn="$ACM_CERT_ARN_FOR_CFN_PARAM" \
            BranchName="$BRANCH_NAME" \
            StaticAssetsS3BucketName="$STATIC_ASSETS_S3_BUCKET_ENV_VAR" \
            ApiGatewayStageName="$API_GATEWAY_STAGE_NAME_FOR_CFN_PARAM" \
            StaticAssetPathPattern="$STATIC_ASSET_PATH_PATTERN_FOR_CFN_PARAM" \
            LambdaRuntime="$LAMBDA_RUNTIME_FOR_CFN_PARAM" \
            LambdaFunctionNames="$LAMBDA_FUNCTION_NAMES" # Pass the derived list of function names

      - echo "✅ CloudFormation deployment initiated. NOTE: Review Lambda configuration in CloudFormation templates for multi-function setup."

  test:
    commands:
      - echo "🧪 Test phase..."
      - export APP_URL_DOMAIN=$(aws cloudformation describe-stacks --stack-name $CFN_STACK_NAME --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionDomainNameOutput'].OutputValue" --output text --region $CFN_REGION_ENV_VAR)
      - if [ -z "$APP_URL_DOMAIN" ]; then echo "❌ Failed to retrieve CloudFront domain name. Tests will be skipped."; exit 1; fi
      - export APP_BASE_URL="https://${APP_URL_DOMAIN}"
      - echo "🎯 Running Playwright tests against $APP_BASE_URL"
      - BASE_URL=$APP_BASE_URL npx playwright test

artifacts:
  files:
    - "$LAMBDA_DIST_DIR/**/*_lambda.zip" # Archive all packaged lambdas
  # reports: # Example for CodeBuild test reporting integration
  #   TestReports: # This name is user-defined for the report group
  #     files:
  #       - 'playwright-report/results.xml' # Adjust path if your Playwright JUnit reporter outputs elsewhere
  #     file-format: JUNITXML
